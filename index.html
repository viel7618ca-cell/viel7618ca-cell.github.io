<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Sigil Test - Light Motion Fix</title>
<style>
  body {
    background: #fff; /* 背景シロ */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  svg {
    width: 300px;
  }
  path, circle {
    stroke: #111; /* 線クロ */
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
    filter: url(#soft-blur);
  }

  /* --- 【修正】光の粒子（黒い点）の設定 --- */
  #glow-particle {
    fill: #111; /* 塗りをクロに */
    stroke: none;
    opacity: 0; /* 最初は非表示 */
    
    /* 動き回るルート（中心100,100 から左に大きく回り込んで 始点100,30 へ） */
    offset-path: path("M 100,100 C 30,130 20,50 100,30");
    offset-rotate: 0deg;
  }

  /* クラスがついたら、即座に表示して1.5秒かけてルートを走り回る */
  .move-particle {
    opacity: 0.8 !important; /* バグ修正：確実にハッキリ見えるように強制適用 */
    transition: offset-distance 1.5s cubic-bezier(0.25, 1, 0.5, 1);
    offset-distance: 100%;
  }

  /* --- 各パーツの出現設定 --- */
  .fade-in {
    transition: opacity 0.6s ease;
    opacity: 1;
  }

  .draw-line {
    transition: stroke-dashoffset 1.8s ease-in-out, opacity 1.8s ease-in-out;
    stroke-dashoffset: 0;
    opacity: 1;
  }

  .draw-circle {
    opacity: 1;
    transition: stroke-dashoffset 1.2s ease-in-out;
    stroke-dashoffset: 0;
  }
</style>
</head>
<body>

<svg viewBox="0 0 200 200">
  <defs>
    <filter id="soft-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 【修正】視認性を上げるため、点の半径（r）を少しだけ大きく「6」にしました -->
  <circle id="glow-particle" r="6" offset-distance="0%" />

  <!-- ①葉っぱ -->
  <circle id="leaf" cx="100" cy="30" r="3" />

  <!-- ②線 -->
  <path id="line" d="M100 30 L150 100 L50 150 L120 170" 
        stroke-dasharray="300" stroke-dashoffset="300" />

  <!-- ③終点〇 -->
  <circle id="end" cx="120" cy="170" r="5" />

  <!-- ④他記号 -->
  <circle id="symbol1" cx="150" cy="100" r="4" />
  <circle id="symbol2" cx="50" cy="150" r="4" />

  <!-- ⑤外円 -->
  <circle id="outer" cx="100" cy="100" r="90" 
          stroke-dasharray="566" stroke-dashoffset="566"
          transform="rotate(-90 100 100)" />

</svg>

<script>
  const particle = document.getElementById("glow-particle");
  const leaf = document.getElementById("leaf");
  const line = document.getElementById("line");
  const end = document.getElementById("end");
  const symbol1 = document.getElementById("symbol1");
  const symbol2 = document.getElementById("symbol2");
  const outer = document.getElementById("outer");

  // 0.0秒: 黒い点が中央付近に現れ、大きなカーブを描いてシュルッと走り出す
  setTimeout(() => {
    particle.classList.add("move-particle");
  }, 50);

  // 1.2秒: 点が目的地に届く直前で、始点の葉っぱがふんわり出現
  setTimeout(() => {
    leaf.classList.add("fade-in");
  }, 1200);

  // 1.5秒: 点が目的地（始点）に到達すると同時に、フッと消える（残光フェードアウト）
  // それと入れ替わりで、線がふんわりと伸び始める（ここで綺麗な重なりが発生）
  setTimeout(() => {
    particle.style.transition = "opacity 0.4s ease"; // スッと消えるための設定に切り替え
    particle.style.opacity = "0"; 
    line.classList.add("draw-line"); 
  }, 1500);

  // 3.0秒: 終点〇が出現
  setTimeout(() => {
    end.classList.add("fade-in");
  }, 3000);

  // 3.2秒: 他の記号が出現
  setTimeout(() => {
    symbol1.classList.add("fade-in");
    symbol2.classList.add("fade-in");
  }, 3200);

  // 3.3秒: 外円が上からぐるっと回り始める
  setTimeout(() => {
    outer.classList.add("draw-circle");
  }, 3300);
</script>

</body>
</html>
