<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Sigil Test - Perfect Timing & Fade</title>
<style>
  body {
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  svg {
    width: 300px;
  }
  path, circle {
    stroke: #111;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
    filter: url(#soft-blur);
  }

  /* --- メインの光の粒子 --- */
  #glow-particle {
    fill: #111;
    stroke: none;
    opacity: 0;
    offset-path: path("M 100,100 C 30,130 20,50 100,30");
    offset-rotate: 0deg;
  }

  /* --- 追いかけるキラキラ粒子（子） --- */
  .sparkle {
    fill: #111;
    stroke: none;
    opacity: 0;
    offset-path: path("M 100,100 C 30,130 20,50 100,30");
    offset-rotate: 0deg;
  }

  /* --- アニメーション制御 --- */
  .move-main {
    opacity: 0.8 !important;
    transition: offset-distance 1.5s cubic-bezier(0.25, 1, 0.5, 1);
    offset-distance: 100%;
  }

  .move-sparkle1 {
    opacity: 0.5 !important;
    transition: offset-distance 1.4s cubic-bezier(0.25, 1, 0.5, 1);
    offset-distance: 98%;
  }
  .move-sparkle2 {
    opacity: 0.3 !important;
    transition: offset-distance 1.45s cubic-bezier(0.3, 1, 0.6, 1);
    offset-distance: 95%;
  }

  /* --- 【修正】着地後の消え方：キラキラがその場に残りながらじわっと消える設定 --- */
  .fade-out-main {
    transition: opacity 0.2s ease !important;
    opacity: 0 !important;
  }
  .fade-out-sparkle {
    /* 0.8秒かけて、その場に留まったままゆっくり空気中に溶ける */
    transition: opacity 0.8s ease-out !important;
    opacity: 0 !important;
  }

  /* --- シジル各パーツ --- */
  .fade-in {
    transition: opacity 0.6s ease;
    opacity: 1;
  }

  .draw-line {
    transition: stroke-dashoffset 1.8s ease-in-out, opacity 1.8s ease-in-out;
    stroke-dashoffset: 0;
    opacity: 1;
  }

  .draw-circle {
    opacity: 1;
    transition: stroke-dashoffset 1.2s ease-in-out;
    stroke-dashoffset: 0;
  }
</style>
</head>
<body>

<svg viewBox="0 0 200 200">
  <defs>
    <filter id="soft-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <circle id="sparkle2" class="sparkle" r="1.2" offset-distance="0%" />
  <circle id="sparkle1" class="sparkle" r="1.8" offset-distance="0%" />
  <circle id="glow-particle" r="2.5" offset-distance="0%" />

  <!-- ①葉っぱ -->
  <circle id="leaf" cx="100" cy="30" r="3" />

  <!-- ②線 -->
  <path id="line" d="M100 30 L150 100 L50 150 L120 170" 
        stroke-dasharray="300" stroke-dashoffset="300" />

  <!-- ③終点〇 -->
  <circle id="end" cx="120" cy="170" r="5" />

  <!-- ④他記号 -->
  <circle id="symbol1" cx="150" cy="100" r="4" />
  <circle id="symbol2" cx="50" cy="150" r="4" />

  <!-- ⑤外円 -->
  <circle id="outer" cx="100" cy="100" r="90" 
          stroke-dasharray="566" stroke-dashoffset="566"
          transform="rotate(-90 100 100)" />

</svg>

<script>
  const particle = document.getElementById("glow-particle");
  const sp1 = document.getElementById("sparkle1");
  const sp2 = document.getElementById("sparkle2");
  
  const leaf = document.getElementById("leaf");
  const line = document.getElementById("line");
  const end = document.getElementById("end");
  const symbol1 = document.getElementById("symbol1");
  const symbol2 = document.getElementById("symbol2");
  const outer = document.getElementById("outer");

  // 0.0秒: 光たちがシュルッと泳ぎ出す
  setTimeout(() => {
    particle.classList.add("move-main");
    sp1.classList.add("move-sparkle1");
    sp2.classList.add("move-sparkle2");
  }, 50);

  // 1.2秒: 目的地に届く直前で始点（葉っぱ）が出現
  setTimeout(() => {
    leaf.classList.add("fade-in");
  }, 1200);

  // 【修正】1.5秒: メイン光が着地した瞬間に「完全同時」で処理を分ける
  setTimeout(() => {
    // 1. メインの点は役割を終えてスッと消える
    particle.classList.add("fade-out-main");
    
    // 2. 後ろにいたキラキラたちは、その場に残りながらじわ〜っとフェードアウト（0.8秒かける）
    sp1.classList.add("fade-out-sparkle");
    sp2.classList.add("fade-out-sparkle");
    
    // 3. 同時に、待たせることなくシジルの線がふんわり描き始める
    line.classList.add("draw-line"); 
  }, 1500);

  // 3.0秒: 終点〇
  setTimeout(() => {
    end.classList.add("fade-in");
  }, 3000);

  // 3.2秒: 他記号
  setTimeout(() => {
    symbol1.classList.add("fade-in");
    symbol2.classList.add("fade-in");
  }, 3200);

  // 3.3秒: 外円
  setTimeout(() => {
    outer.classList.add("draw-circle");
  }, 3300);
</script>

</body>
</html>
