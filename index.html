<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Sigil Test - Light Motion</title>
<style>
  body {
    background: #fff; /* 背景シロ */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  svg {
    width: 300px;
  }
  path, circle {
    stroke: #111; /* 線クロ */
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
    filter: url(#soft-blur);
  }

  /* --- 光の粒子（黒い点）の動き回り設定 --- */
  #glow-particle {
    fill: #111;
    stroke: none;
    opacity: 0;
    
    /* 動き回るルート（見えないガイド線）を指定：中心から左を回り、上へと昇る曲線 */
    offset-path: path("M 100,100 C 50,120 30,60 100,30");
    offset-rotate: 0deg;
  }

  /* クラスがついたら1.5秒かけてルートを走り回る */
  .move-particle {
    opacity: 0.7;
    /* transitionで位置（offset-distance）を0%から100%へ動かす。緩急（cubic-bezier）をつけて生き物っぽく */
    transition: offset-distance 1.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
    offset-distance: 100%;
  }

  /* --- 各パーツの出現設定 --- */
  .fade-in {
    transition: opacity 0.6s ease;
    opacity: 1;
  }

  .draw-line {
    transition: stroke-dashoffset 1.8s ease-in-out, opacity 1.8s ease-in-out;
    stroke-dashoffset: 300;
    stroke-dashoffset: 0;
    opacity: 1;
  }

  .draw-circle {
    opacity: 1;
    transition: stroke-dashoffset 1.2s ease-in-out;
    stroke-dashoffset: 0;
  }
</style>
</head>
<body>

<svg viewBox="0 0 200 200">
  <defs>
    <filter id="soft-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 光の粒子（最初はoffset-pathの始点に配置されるためcx, cyは不要） -->
  <circle id="glow-particle" r="4" offset-distance="0%" />

  <!-- ①葉っぱ -->
  <circle id="leaf" cx="100" cy="30" r="3" />

  <!-- ②線 -->
  <path id="line" d="M100 30 L150 100 L50 150 L120 170" 
        stroke-dasharray="300" stroke-dashoffset="300" />

  <!-- ③終点〇 -->
  <circle id="end" cx="120" cy="170" r="5" />

  <!-- ④他記号 -->
  <circle id="symbol1" cx="150" cy="100" r="4" />
  <circle id="symbol2" cx="50" cy="150" r="4" />

  <!-- ⑤外円 -->
  <circle id="outer" cx="100" cy="100" r="90" 
          stroke-dasharray="566" stroke-dashoffset="566"
          transform="rotate(-90 100 100)" />

</svg>

<script>
  const particle = document.getElementById("glow-particle");
  const leaf = document.getElementById("leaf");
  const line = document.getElementById("line");
  const end = document.getElementById("end");
  const symbol1 = document.getElementById("symbol1");
  const symbol2 = document.getElementById("symbol2");
  const outer = document.getElementById("outer");

  // === 新しいタイムライン（光の動きを1.5秒しっかり見せる） ===

  // 0.0秒: 黒い点が現れ、シジルの左側を大きく回り込むようにシュルッと動き出す
  setTimeout(() => {
    particle.classList.add("move-particle");
  }, 10);

  // 1.2秒: 点が動き終わる（1.5秒）の「少し手前（0.3秒前）」で、始点の葉っぱがふんわり出現
  setTimeout(() => {
    leaf.classList.add("fade-in");
  }, 1200);

  // 1.5秒: 点が目的地（始点）に到達すると同時に、じわっと消え始める（残光化）
  // 同時に、そのエネルギーを引き継ぐようにシジルの線がふんわり伸び始める（ここで0.何秒かの綺麗な重なりが発生）
  setTimeout(() => {
    particle.style.opacity = "0"; // ここから残光フェードアウト
    line.classList.add("draw-line"); // 線が伸び始める
  }, 1500);

  // 3.0秒: 線が伸びる終盤で終点〇が出現
  setTimeout(() => {
    end.classList.add("fade-in");
  }, 3000);

  // 3.2秒: 他の記号が出現
  setTimeout(() => {
    symbol1.classList.add("fade-in");
    symbol2.classList.add("fade-in");
  }, 3200);

  // 3.3秒: 外円が上からぐるっと回り始める（全体で約4.5秒ほどで着地）
  setTimeout(() => {
    outer.classList.add("draw-circle");
  }, 3300);
</script>

</body>
</html>
