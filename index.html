<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Sigil Test - Final Adjustment</title>
<style>
  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  svg {
    width: 300px;
  }
  path, circle {
    stroke: #fff;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
    filter: url(#soft-glow);
  }

  .fade-in {
    transition: opacity 0.8s ease;
    opacity: 1;
  }

  .draw-line {
    transition: stroke-dashoffset 1.8s ease-in-out, opacity 1.8s ease-in-out;
    stroke-dashoffset: 0;
    opacity: 1;
  }

  /* --- 外円の動きをさらにゆっくり（2.0s）に変更 --- */
  .draw-circle {
    opacity: 1;
    /* 2.0秒かけて、静かに円を閉じる */
    transition: stroke-dashoffset 2.0s ease-out, opacity 1.5s ease-in-out;
    stroke-dashoffset: 0;
  }
</style>
</head>
<body>

<svg viewBox="0 0 200 200">
  <defs>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <circle id="leaf" cx="100" cy="30" r="3" />
  <path id="line" d="M100 30 L150 100 L50 150 L120 170" 
        stroke-dasharray="300" stroke-dashoffset="300" />
  <circle id="end" cx="120" cy="170" r="5" />
  <circle id="symbol1" cx="150" cy="100" r="4" />
  <circle id="symbol2" cx="50" cy="150" r="4" />

  <circle id="outer" cx="100" cy="100" r="90" 
          stroke-dasharray="566" stroke-dashoffset="566"
          transform="rotate(-90 100 100)" />
</svg>

<script>
  const leaf = document.getElementById("leaf");
  const line = document.getElementById("line");
  const end = document.getElementById("end");
  const symbol1 = document.getElementById("symbol1");
  const symbol2 = document.getElementById("symbol2");
  const outer = document.getElementById("outer");

  // ① 葉っぱ
  setTimeout(() => {
    leaf.classList.add("fade-in");
  }, 200);

  // ② 線 (1.8s)
  setTimeout(() => {
    line.classList.add("draw-line");
  }, 800);

  // ③ 終点〇
  setTimeout(() => {
    end.classList.add("fade-in");
  }, 2300);

  // ④ 他記号
  setTimeout(() => {
    symbol1.classList.add("fade-in");
    symbol2.classList.add("fade-in");
  }, 2700);

  // ⑤ 外円 (2.0sかけてゆっくり描画)
  setTimeout(() => {
    outer.classList.add("draw-circle");
  }, 3500);
</script>

</body>
</html>
